    ip-whitelist:
      ipAllowList:
        sourceRange:
          - "10.218.40.0/21" # BBN Devlan IP range
          - "130.145.227.37"
          - "130.143.86.158"
    api-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
        accessControlAllowOriginList:
          - "*"
        accessControlAllowHeaders:
          - "*"
        accessControlMaxAge: 100
        addVaryHeader: true

    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
        
    redirect-to-prometheus-https:
      redirectScheme:
        scheme: https
        permanent: true
        port: 9090

    redirect-to-grafana-https:
      redirectScheme:
        scheme: https
        permanent: true
        port: 443

  routers:
    prometheus-internal:
      rule: Host(`prom-internal.monitor-staging.synergy.philips.com`)
      service: prometheus-service
      entryPoints:
        - web
      middlewares:
        - ip-whitelist
      tls: true
      priority: 100

    # External router for non-whitelisted access (requires Basic Auth)
    prometheus-external:
      rule: Host(`prom.monitor-staging.synergy.philips.com`)
      service: prometheus-service
      entryPoints:
        - web
      middlewares:
        - auth
        - redirect-to-prometheus-https
      tls: true
      priority: 50

    influx:
      rule: Host(`influx.monitor-staging.synergy.philips.com`)
      service: influxdb-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
      tls: true
      priority: 50

    consul:
      rule: Host(`consul.monitor-staging.synergy.philips.com`)
      service: consul-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
      tls: true
      priority: 50

    devlake:
      rule: Host(`devlake.monitor-staging.synergy.philips.com`)
      service: devlake-service
      entryPoints:
        - web
      tls: true
      priority: 50

    # Devlake router (HTTP)
    devlake-http:
      rule: Host(`devlake.monitor-staging.synergy.philips.com`)
      service: devlake-service
      entryPoints:
        - http
      middlewares:
        - redirect-to-https
      priority: 50

    # Devlake router (HTTPS)
    devlake-secured:
      rule: Host(`devlake.monitor-staging.synergy.philips.com`)
      service: devlake-service
      entryPoints:
        - https
      middlewares:
        - ldap-auth
      tls: true
      priority: 50

    # Grafana HTTP router (with redirect to HTTPS)
    grafana-http:
      rule: Host(`monitor-staging.synergy.philips.com`)
      service: grafana-service
      entryPoints:
        - http
      middlewares:
        - redirect-to-grafana-https
      priority: 100

    # SGP API HTTP router (with redirect to HTTPS)
    sgp-api:
      rule: Host(`api.monitor-staging.synergy.philips.com`)
      service: sgp-service
      entryPoints:
        - http
      middlewares:
        - api-headers
        - redirect-to-https
      priority: 50
      
    # SGP API HTTPS router
    sgp-api-secured:
      rule: Host(`api.monitor-staging.synergy.philips.com`)
      service: sgp-service
      entryPoints:
        - https
      middlewares:
        - ldap-auth
        - api-headers
      tls: true
      priority: 50

  services:
    prometheus-service:
      loadBalancer:
        servers:
          - url: http://prometheus:9090
            scheme: http
            port: 9090
    influxdb-service:
      loadBalancer:
        servers:
          - url: http://influxdb:8086
            scheme: http
            port: 8086
    devlake-service:
      loadBalancer:
        servers:
          - url: http://devlake-config-ui:4000
            scheme: http
            port: 4000
    consul-service:
      loadBalancer:
        servers:
          - url: http://consul:8500
            scheme: http
            port: 8500
    grafana-service:
      loadBalancer:
        servers:
          - url: https://grafana:443
            scheme: https
            port: 443
    sgp-service:
      loadBalancer:
        servers:
          - url: http://sgp:443
            scheme: http
            port: 443

tls:
  stores:
    default:
      defaultCertificate:
        certFile: "/etc/ssl/certs/monitor_staging_synergy_philips_com.pem"
        keyFile: "/run/secrets/ssl_key_file_staging"
